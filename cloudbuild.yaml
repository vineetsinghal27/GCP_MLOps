steps:
# Step 1: Install Dependencies + Run Training Code
- name: 'python:3.10'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      pip install -r requirements.txt
      python train.py

# ✅ Step 1.5: Verify the saved model artifact
- name: 'python:3.10'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      pip install joblib scikit-learn
      python verify_model.py

# Step 2: Register model in Vertex AI
- name: 'python:3.10'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      pip install google-cloud-aiplatform google-cloud-storage
      python register.py

options:
  logging: CLOUD_LOGGING_ONLY