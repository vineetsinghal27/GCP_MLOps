# Step 1: Run Vertex AI Training Job
steps:
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'run-vertex-training'
  entrypoint: 'bash'
  args:
   - '-c'
   - |
     gcloud ai custom-jobs create \
       --region=asia-south1 \
       --display-name=fraud-training-job-$(date +%Y%m%d-%H%M%S) \
       --worker-pool-spec=machine-type=n1-standard-4,replica-count=1,container-image-uri=asia-docker.pkg.dev/vertex-ai/training/scikit-learn-cpu.1-0:latest,local-package-path=.,script=train.py

# Optional: log success
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'log-success'
  entrypoint: 'bash'
  args:
    - '-c'
    - echo "✅ Vertex AI training job triggered successfully"

options:
   serviceAccount: projects/aais-gcp-mlops-usc1-ri/serviceAccounts/vertax-ai@aais-gcp-mlops-usc1-ri.iam.gserviceaccount.com
timeout: '1200s'

