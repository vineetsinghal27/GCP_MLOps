steps:
# Step 1: Install dependencies
- name: 'python:3.10'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      pip install -r requirements.txt

# Step 2: Run training
- name: 'python:3.10'
  entrypoint: 'bash'
  args: 
    - '-c'
    - |
      python train.py

# Step 3: Upload model to GCS
- name: 'gcr.io/cloud-builders/gsutil'
  args: 
    - 'cp'
    - 'outputs/model.pkl'
    - 'gs://credit-card-fraud-gcp/'

# Step 4: Upload metrics
- name: 'gcr.io/cloud-builders/gsutil'
  args:
    - 'cp'
    - 'outputs/metrics.json'
    - 'gs://credit-card-fraud-gcp/'

options:
   logging: CLOUD_LOGGING_ONLY

