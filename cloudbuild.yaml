steps:
# ------------------------------------------------------
# Step 1: Install dependencies and train the model
# ------------------------------------------------------
- name: 'python:3.10'
  entrypoint: 'bash'
  env:
    - 'BUCKET_NAME=credit-card-fraud-gcp'
  args:
    - '-c'
    - |
      pip install --no-cache-dir -r requirements.txt
      python train.py

# ------------------------------------------------------
# Step 2: Validate model artifact locally
# ------------------------------------------------------
- name: 'python:3.10'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      pip install --no-cache-dir scikit-learn==1.5 joblib numpy
      python - <<EOF
      import joblib
      model = joblib.load("/tmp/outputs/model.pkl")
      print("✅ Model type:", type(model))
      assert hasattr(model, "predict"), "❌ Model missing predict()"
      EOF

# ------------------------------------------------------
# Step 3: Register model in Vertex AI (pre-built container)
# ------------------------------------------------------
- name: 'python:3.10'
  entrypoint: 'bash'
  env:
    - 'BUCKET_NAME=credit-card-fraud-gcp'
  args:
    - '-c'
    - |
      pip install --no-cache-dir google-cloud-aiplatform google-cloud-storage
      python register.py

options:
  logging: CLOUD_LOGGING_ONLY